<div class="shell">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <img
        src="/branding/mahaesuvidha-marathi-logo.jpg"
        alt="Maha E Suvidha logo"
        class="brand-logo"
      />
      <div>
        <strong>Maha E Suvidha</strong>
        <p>Secure citizen access built with Spring Boot, Angular, and PostgreSQL</p>
      </div>
    </a>

    <nav class="actions">
      @if (authService.currentUser(); as user) {
        <span class="welcome-chip">Hi, {{ user.fullName }}</span>
        <a routerLink="/welcome" class="ghost-button">Dashboard</a>
        <button type="button" class="primary-button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/sign-in" class="ghost-button">Sign In</a>
        <a routerLink="/sign-up" class="primary-button">Open Account</a>
      }
    </nav>
  </header>

  <main class="page-frame">
    <router-outlet></router-outlet>
  </main>
</div>
