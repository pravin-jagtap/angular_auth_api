<div class="shell">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <span class="brand-mark">A</span>
      <div>
        <strong>Auth Starter</strong>
        <p>Spring Boot + Angular + PostgreSQL</p>
      </div>
    </a>

    <nav class="actions">
      @if (authService.currentUser(); as user) {
        <span class="welcome-chip">Hi, {{ user.fullName }}</span>
        <a routerLink="/welcome" class="ghost-button">Welcome</a>
        <button type="button" class="primary-button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/sign-in" class="ghost-button">Sign In</a>
        <a routerLink="/sign-up" class="primary-button">Sign Up</a>
      }
    </nav>
  </header>

  <main class="page-frame">
    <router-outlet></router-outlet>
  </main>
</div>
